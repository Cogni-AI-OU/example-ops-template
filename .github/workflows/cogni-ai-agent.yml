---
name: Cogni AI Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_call:
    inputs:
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Prompt for the agent
        required: false
        type: string
  workflow_dispatch:
    inputs:
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Prompt for the agent
        required: false
        type: string
jobs:
  cogni-ai-agent:
    uses: Cogni-AI-OU/.github/.github/workflows/cogni-ai-agent.yml@main
    with:
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt }}
    secrets: inherit
