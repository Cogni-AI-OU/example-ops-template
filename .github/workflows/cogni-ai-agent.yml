---
# @docs: <https://opencode.ai/docs>
name: Cogni AI Agent
# yamllint disable-line rule:truthy
on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  issues:
    types:
      - opened
      - edited
  pull_request:
    types:
      - opened
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        options:
          - cogni-ai-architect
          - cogni-ai-brain-ops
          - cogni-ai-code-reviewer
          - cogni-ai-devops
          - cogni-ai-plan-reviewer
        required: false
        type: choice
      model:  # @docs: <https://opencode.ai/zen/v1/models>
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3.6-plus
          - opencode/qwen3.5-plus
          # Grok models (xAI)
          - xai/grok-4-1-fast-non-reasoning  # Fast responses, 2M context
          - xai/grok-4-1-fast-reasoning  # Tool-calling + reasoning, 2M context
          - xai/grok-4.20-0309-non-reasoning  # Flagship, 2M context
          - xai/grok-4.20-0309-reasoning  # Flagship + reasoning, 2M context
          - xai/grok-code-fast-1  # Agentic coding + reasoning, 256K context
        required: true
        type: choice
      prompt:
        description: Prompt for the agent
        required: false
        type: string
jobs:
  cogni-ai-agent:
    name: Run Cogni AI agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      discussions: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - name: Clone agents
        run: git clone --depth=1 https://github.com/Cogni-AI-OU/cogni-ai-agents .github/agents
      - name: Clone instructions
        run: git clone --depth=1 https://github.com/Cogni-AI-OU/cogni-ai-agent-instructions .github/instructions
      - name: Clone skills
        run: git clone --depth=1 https://github.com/Cogni-AI-OU/cogni-ai-agent-skills .github/skills
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5.0.1
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # See: <https://github.com/Cogni-AI-OU/cogni-ai-agent-action>
      - name: Run Cogni AI Agent
        uses: Cogni-AI-OU/cogni-ai-agent-action@main
        with:
          agent: ${{ inputs.agent }}
          model: ${{ inputs.model }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}  # <https://opencode.ai/auth>
          permissions: |-
            bash:
              '*': deny
              ansible*: allow
              ansible-galaxy*: allow
              ansible-playbook*: allow
              awk*: allow
              base64*: allow
              continue*: allow
              cp*: allow
              docker*: allow
              ex*: allow
              gh*: allow
              gh pr review*: deny
              git*: allow
              hexdump*: allow
              jq*: allow
              links*: allow
              mawk*: allow
              molecule*: allow
              pipx*: allow
              pre-commit*: allow
              printf*: allow
              sed*: allow
              set*: allow
              time*: allow
              timeout*: allow
              touch*: allow
              true*: allow
              vim*: allow
          prompt: >-
            ${{ github.event.comment.body ||
                github.event.discussion.body ||
                github.event.issue.body ||
                github.event.pull_request.body ||
                inputs.prompt }}
  summary:
    name: Generate Summary (post-run)
    needs: cogni-ai-agent
    if: always() && needs.cogni-ai-agent.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Generate Summary
        uses: Cogni-AI-OU/cogni-ai-agent-action/ai-inference/summary@main
        with:
          agent_job_id: cogni-ai-agent
          github_token: ${{ secrets.GITHUB_TOKEN }}
