---
name: OpenCode
# yamllint disable-line rule:truthy
on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, edited]
  workflow_call:
    inputs:
      agent:
        description: Agent to use
        required: false
        type: string
      model:
        description: Model to use
        required: false
        type: string
      issue_number:
        description: Issue or PR number
        required: false
        type: number
      prompt:
        description: Custom prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        description: Agent to use
        required: false
        type: string
      model:
        description: Model to use
        required: false
        type: string
      issue_number:
        description: Issue or PR number
        required: false
        type: number
      prompt:
        description: Custom prompt
        required: false
        type: string
jobs:
  opencode:
    uses: Cogni-AI-OU/.github/.github/workflows/opencode.yml@main
    with:
      agent: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.agent }}
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt }}
      issue_number: >-
        ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit
