---
name: OpenCode
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
  pull_request_review:
    types:
      - submitted
  workflow_call:
    inputs:
      agent:
        default: build
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3.1-pro' }}
        description: Model to use for OpenCode
        required: false
        type: string
      issue_number:
        description: Issue or PR number for workflow_call triggers
        required: false
        type: number
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai
        description: Agent to use.
        options:
          - build
          - cogni-ai
          - compaction
          - plan
          - summary
          - title
        required: false
        type: choice
      model:
        default: opencode/gemini-3.1-pro
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/gemini-3-pro
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: false
        type: choice
      issue_number:
        description: Issue or PR number for manual workflow execution
        required: false
        type: number
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
jobs:
  opencode:
    uses: Cogni-AI-OU/.github/.github/workflows/opencode.yml@main
    with:
      agent: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.agent }}
      model: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.model }}
      prompt: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.prompt }}
      issue_number: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
