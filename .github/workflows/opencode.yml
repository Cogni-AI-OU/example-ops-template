---
# Note: Keep keys and envs in alphabetical order.
name: OpenCode
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:
  workflow_call:
permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write
jobs:
  opencode:
    # See: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
    uses: Cogni-AI-OU/.github/.github/workflows/opencode.yml@main
    # Job-level permissions are passed to the reusable workflow
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
