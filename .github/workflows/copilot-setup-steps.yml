---
# GitHub Copilot cloud agent customization.
# <https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/customize-the-agent-environment>
name: Copilot Setup Steps
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/requirements.txt
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/requirements.txt
env:
  # Pin external repositories to specific SHAs for reproducibility.
  COGNI_AI_AGENTS_REF: fa9e4a7f3a95a95430c4c7c051d3e718a4cfdf58
  COGNI_AI_AGENT_INSTRUCTIONS_REF: d4ff44a0bffd72a5f590ec83e6b4dfce5d3a15c6
  COGNI_AI_AGENT_SKILLS_REF: d47c2e7c39e172b2469bede875e238bf603201c3
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Clone agents
        run: |
          rm -rf .github/agents
          git clone https://github.com/Cogni-AI-OU/cogni-ai-agents .github/agents
          cd .github/agents
          git checkout "$COGNI_AI_AGENTS_REF"
      - name: Clone instructions
        run: |
          rm -rf .github/instructions
          git clone https://github.com/Cogni-AI-OU/cogni-ai-agent-instructions .github/instructions
          cd .github/instructions
          git checkout "$COGNI_AI_AGENT_INSTRUCTIONS_REF"
      - name: Clone skills
        run: |
          rm -rf .github/skills
          git clone https://github.com/Cogni-AI-OU/cogni-ai-agent-skills .github/skills
          cd .github/skills
          git checkout "$COGNI_AI_AGENT_SKILLS_REF"
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5.0.1
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
