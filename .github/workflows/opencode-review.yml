---
name: OpenCode Review
on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - review_requested
  pull_request_target:
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - review_requested
  workflow_call:
  workflow_dispatch:
jobs:
  opencode-review:
    uses: Cogni-AI-OU/.github/.github/workflows/opencode-review.yml@main
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
