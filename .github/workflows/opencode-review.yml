---
# Note: Keep keys and envs in alphabetical order.
name: OpenCode Review
on:
  pull_request_target:
    # Note: synchronize not included to avoid too frequent reviews on every push.
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - review_requested
  workflow_call:
permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write
jobs:
  opencode-review:
    if: >-
      github.event_name == 'workflow_call' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.pull_request.author_association)
      )
    # See: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
    uses: Cogni-AI-OU/.github/.github/workflows/opencode-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    # Job-level permissions are passed to the reusable workflow
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
