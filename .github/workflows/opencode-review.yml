---
# See: <https://opencode.ai/docs/github/>
# Note: Keep keys and envs in alphabetical order.
name: OpenCode Review
# Prevent concurrent runs on the same PR to avoid push conflicts.
# When a new run is triggered, the previous pending run is cancelled.
concurrency:
  cancel-in-progress: true
  group: opencode-review-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - review_requested
  workflow_call:
    inputs:
      additional_prompt:
        description: Additional instructions for the review prompt
        required: false
        type: string
      agent:
        default: build
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3.1-pro' }}
        description: Model to use for OpenCode
        required: false
        type: string
      pr_number:
        description: Pull request number for workflow_call triggers
        required: true
        type: number
      prompt:
        default: pr-review
        description: Prompt template name from .github/prompts (without extension)
        required: false
        type: string
  workflow_dispatch:
    inputs:
      additional_prompt:
        description: Additional instructions for the review prompt
        required: false
        type: string
      agent:
        default: cogni-ai
        description: Agent to use.
        options:
          - build
          - cogni-ai
          - compaction
          - plan
          - summary
          - title
        required: false
        type: choice
      model:
        default: opencode/gemini-3.1-pro
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/gemini-3-pro
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: false
        type: choice
      pr_number:
        description: Pull request number for manual workflow execution
        required: true
        type: number
      prompt:
        default: pr-review
        description: Prompt template name from .github/prompts (without extension)
        options:
          - pr-review
        required: false
        type: choice
env:
  OPENCODE_MODEL_DEFAULT: opencode/gemini-3.1-pro
jobs:
  opencode-review:
    # Run automatically for trusted PRs, including Copilot-authored PRs,
    # or when an OWNER/MEMBER adds a `/review` comment on a PR.
    if: |
      (
        github.event_name == 'pull_request' &&
        (
          contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.pull_request.author_association) ||
          (
            contains(fromJson('["Copilot","copilot[bot]","copilot-swe-agent"]'), github.event.pull_request.user.login)
            && github.event.pull_request.author_association == 'CONTRIBUTOR'
          )
        )
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review') &&
        !endsWith(github.actor, '[bot]') &&
        contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '/review') &&
        !endsWith(github.actor, '[bot]') &&
        contains(fromJson('["COLLABORATOR","MEMBER","OWNER"]'), github.event.comment.author_association)
      ) ||
      (github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch')
    name: OpenCode Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Needed so opencode can request an OIDC token for GitHub API calls
      issues: read
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ];
          then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ] || \
               [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Get PR details
        id: pr-details
        run: |
          gh api "/repos/${{ github.repository }}/pulls/${{ steps.pr-number.outputs.number }}" > pr_data.json
          gh pr view "${{ steps.pr-number.outputs.number }}" --repo "${{ github.repository }}" \
            --json files > pr_files.json
          sanitized_title=$(jq -r '.title
            | gsub("[\u0000-\u0008\u000B-\u001F\u007F]";"")
            | gsub("\r\n|\r|\n";" ")
            | gsub("&";"&amp;")
            | gsub("<";"&lt;")
            | gsub(">";"&gt;")' pr_data.json)
          echo "title=${sanitized_title}" >> "$GITHUB_OUTPUT"
          echo "sha=$(jq -r .head.sha pr_data.json)" >> "$GITHUB_OUTPUT"
          files_json=$(jq -c '.files | map(.path)' pr_files.json)
          echo "files=${files_json}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: recursive
      - uses: actions/cache@v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|
      - uses: actions/setup-python@v6.1.0
        with:
          cache: pip
          cache-dependency-path: .devcontainer/requirements.txt
          python-version: '3.12'
      - name: Cache installed dependencies
        id: cache-dependencies
        uses: actions/cache@v5.0.1
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-pip-${{ env.pythonLocation }}-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: pip install -r .devcontainer/requirements.txt
      - name: Load review prompt
        id: load-prompt
        env:
          PROMPT_INPUT: ${{ inputs.prompt }}
        run: |
          set -euo pipefail
          prompt_name="${PROMPT_INPUT:-pr-review}"
          [[ "$prompt_name" =~ ^[a-z0-9-]+$ ]] || { echo "Invalid prompt: $prompt_name"; exit 1; }
          prompt_file=".github/prompts/$prompt_name.prompt.md"
          [ -f "$prompt_file" ] || { echo "Missing prompt: $prompt_file"; exit 1; }
          { echo 'prompt<<EOF'; cat "$prompt_file"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          # Keep shell permissions aligned with .vscode/settings.json allowlist and in alphabetical order.
          OPENCODE_PERMISSION: |-
            {
              "bash": {
                "*": "deny",
                "ansible*": "allow",
                "ansible-galaxy*": "allow",
                "ansible-playbook*": "allow",
                "awk*": "allow",
                "continue*": "allow",
                "cp*": "allow",
                "ex*": "allow",
                "gh*": "allow",
                "gh pr review*": "deny",
                "git*": "allow",
                "hexdump*": "allow",
                "links*": "allow",
                "mawk*": "allow",
                "pipx*": "allow",
                "pre-commit*": "allow",
                "printf*": "allow",
                "set*": "allow",
                "time*": "allow",
                "timeout*": "allow",
                "touch*": "allow",
                "true*": "allow",
                "vim*": "allow"
              }
            }
        with:
          agent: ${{ inputs.agent || 'build' }}
          # See: <https://opencode.ai/docs/models/>
          model: ${{ inputs.model || env.OPENCODE_MODEL_DEFAULT }}
          prompt: |-
            Pull request needs to be reviewed in the context of the following repository:
            <repo>
            ${{ github.repository }}
            </repo>
            <pr-number>
            ${{ steps.pr-number.outputs.number }}
            </pr-number>
            <pr-files-json>
            ${{ steps.pr-details.outputs.files }}
            </pr-files-json>
            <pr-title>
            ${{ steps.pr-details.outputs.title }}
            </pr-title>
            <pr-sha>
            ${{ steps.pr-details.outputs.sha }}
            </pr-sha>
            ${{ steps.load-prompt.outputs.prompt }}
            ${{ inputs.additional_prompt && format('\nAdditional instructions:\n{0}', inputs.additional_prompt) || '' }}
      - name: Show OpenCode log on failure
        if: failure()
        run: |-
          tail -n 100 ~/.local/share/opencode/log/*.log 2>/dev/null
